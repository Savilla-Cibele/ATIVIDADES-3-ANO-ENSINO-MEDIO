<script>
  const checkboxes = document.querySelectorAll('input[type="checkbox"]');

  // Quando a página carregar
  window.addEventListener("load", () => {
    checkboxes.forEach(checkbox => {
      const savedState = localStorage.getItem(checkbox.id);

      if (savedState === "true") {
        checkbox.checked = true;
      }
    });
  });

  // Quando clicar no checkbox
  checkboxes.forEach(checkbox => {
    checkbox.addEventListener("change", () => {
      localStorage.setItem(checkbox.id, checkbox.checked);
    });
  });
</script>
<script>
document.addEventListener("DOMContentLoaded", function () {

  const grids = document.querySelectorAll(".calendar-grid");

  grids.forEach(grid => {
    const cards = Array.from(grid.querySelectorAll(".day"));

    cards.sort((a, b) => {
      const dataA = a.querySelector(".date").textContent.trim();
      const dataB = b.querySelector(".date").textContent.trim();

      // Pega apenas o primeiro número da data (ex: 02/03-06/03 vira 02)
      const numeroA = parseInt(dataA.match(/\d+/));
      const numeroB = parseInt(dataB.match(/\d+/));

      return numeroA - numeroB;
    });

    // Limpa e reinsere ordenado
    cards.forEach(card => grid.appendChild(card));
  });

});
</script>
<script>
document.addEventListener("DOMContentLoaded", function () {

  const hoje = new Date();
  const anoAtual = hoje.getFullYear();
  const mesAtual = hoje.getMonth(); // 0 = janeiro
  const diaAtual = hoje.getDate();

  const secoes = document.querySelectorAll("section");

  secoes.forEach(secao => {

    const tituloMes = secao.querySelector("h2");
    if (!tituloMes) return;

    const nomeMes = tituloMes.textContent.trim().toLowerCase();

    const meses = {
      "janeiro": 0,
      "fevereiro": 1,
      "março": 2,
      "abril": 3,
      "maio": 4,
      "junho": 5,
      "julho": 6,
      "agosto": 7,
      "setembro": 8,
      "outubro": 9,
      "novembro": 10,
      "dezembro": 11
    };

    const mesNumero = meses[nomeMes];
    if (mesNumero === undefined) return;

    const cards = secao.querySelectorAll(".day");

    cards.forEach(card => {
      const textoData = card.querySelector(".date").textContent.trim();
      const numeroDia = parseInt(textoData.match(/\d+/));

      if (!numeroDia) return;

      const dataCard = new Date(anoAtual, mesNumero, numeroDia);

      if (dataCard < hoje.setHours(0,0,0,0)) {
        card.classList.add("passado");
      }
    });

  });

});
</script>
